name: Refresh archive cache

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run generate:archive-cache
      - name: Commit refreshed archive cache
        run: |
          if git diff --quiet -- src/data/archive-cache.json; then
            echo "No archive cache changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/archive-cache.json
          git commit -m "chore: refresh archive bootstrap cache"
          git push
